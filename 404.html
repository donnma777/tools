<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — どんまうんど-Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c14;
      --surface: #13131f;
      --border: rgba(255,255,255,0.07);
      --text: #e8e8f0;
      --muted: #7a7a9a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topnav {
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      background: rgba(12,12,20,0.85);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topnav-inner {
      max-width: 1100px;
      margin: 0 auto;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topnav-brand {
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.05em;
      color: var(--text);
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .topnav-brand:hover { opacity: 0.7; }

    .topnav-site {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      transition: color 0.15s, border-color 0.15s;
    }

    .topnav-site:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.2);
    }

    .topnav-site-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00fff7;
      flex-shrink: 0;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      position: relative;
      overflow: hidden;
    }

    main::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 25% 40%, rgba(0,200,255,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 75% 60%, rgba(255,0,127,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      max-width: 560px;
      position: relative;
    }

    .error-code {
      font-family: 'Orbitron', monospace;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #ffffff 0%, #a0a0c8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 8px;
    }

    .error-label {
      display: inline-block;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
      color: #00fff7;
      border: 1px solid rgba(0,255,247,0.3);
      padding: 4px 14px;
      border-radius: 999px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .error-title {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }

    .error-desc {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .btn:hover { opacity: 0.85; transform: translateY(-1px); }

    .btn-primary {
      background: #00fff7;
      color: #0c0c14;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid var(--border);
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
      transition: color 0.15s;
    }

    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

  <nav class="topnav">
    <div class="topnav-inner">
      <a class="topnav-brand" href="/">どんまうんど-Tools</a>
      <a class="topnav-site" href="https://donnma.com/" target="_blank" rel="noopener">
        <span class="topnav-site-dot"></span>
        donnma.com
      </a>
    </div>
  </nav>

  <main>
    <div class="container">
      <div class="error-code">404</div>
      <div class="error-label">Page Not Found</div>
      <div class="error-title">ページが見つかりませんでした</div>
      <p class="error-desc">
        お探しのページは存在しないか、移動・削除された可能性があります。<br>
        URLをご確認のうえ、トップページからお探しください。
      </p>
      <div class="actions">
        <a class="btn btn-primary" href="/">トップページへ戻る</a>
        <a class="btn btn-secondary" href="https://donnma.com/" target="_blank" rel="noopener">donnma.com</a>
      </div>
    </div>
  </main>

  <footer>
    © 2026 <a href="https://donnma.com/" target="_blank" rel="noopener">donnma.com</a> / <a href="https://twitter.com/donnma777" target="_blank" rel="noopener">@donnma777</a>
  </footer>

</body>
</html>
